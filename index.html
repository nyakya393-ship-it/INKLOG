<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkLog v3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <h1>🦑 InkLog</h1>
    <a class="active">Dashboard</a>
  </aside>

  <main class="main">

    <div class="top-stats">
      <div class="stat-box"><div class="label">Total</div><div id="totalBattles">0</div></div>
      <div class="stat-box"><div class="label">Win Rate</div><div id="winRate">0%</div></div>
      <div class="stat-box"><div class="label">Wins</div><div id="wins">0</div></div>
      <div class="stat-box"><div class="label">Loses</div><div id="loses">0</div></div>
      <div class="stat-box"><div class="label">K/D</div><div id="kd">0</div></div>
    </div>

    <section class="panel">
      <h2>Battle Input</h2>

      <form id="battleForm">

        <label>バトルの種類</label>
        <select id="battleType">
          <option value="regular">レギュラー</option>
          <option value="bankara_challenge">バンカラ(チャレンジ)</option>
          <option value="bankara_open">バンカラ(オープン)</option>
          <option value="xmatch">Xマッチ</option>
          <option value="fes_challenge">フェス(チャレンジ)</option>
          <option value="fes_open">フェス(オープン)</option>
          <option value="tricolor">トリカラ</option>
          <option value="event">イベント</option>
          <option value="private">プラベ</option>
        </select>

        <label>ルール</label>
        <select id="rule">
          <option value="turf_war">ナワバリ</option>
          <option value="splat_zones">エリア</option>
          <option value="tower_control">ヤグラ</option>
          <option value="rainmaker">ホコ</option>
          <option value="clam_blitz">アサリ</option>
        </select>

        <label>ステージ</label>
        <select id="stage"></select>

        <label>武器</label>
        <select id="weapon"></select>

        <label>勝敗</label>
        <select id="result">
          <option value="win">勝ち</option>
          <option value="lose">負け</option>
          <option value="disconnect">切断</option>
          <option value="invalid">無効</option>
        </select>

        <label>キル</label>
        <input id="kill" type="number">

        <label>アシスト</label>
        <input id="assist" type="number">

        <label>デス</label>
        <input id="death" type="number">

        <label>塗り</label>
        <input id="paint" type="number">

        <label>SP</label>
        <input id="special" type="number">

        <label>メモ</label>
        <input id="memo" type="text">

        <button type="submit">保存</button>

      </form>
    </section>

    <section class="panel">
      <h2>Recent Battles</h2>
      <div id="list"></div>
    </section>

  </main>

</div>

<div id="toast">Saved</div>

<script src="app.js"></script>

</body>
</html>
