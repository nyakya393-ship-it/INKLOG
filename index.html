<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkLog v3 (stat.ink style)</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- サイドバー -->
  <aside class="sidebar">
    <h1>🦑 InkLog</h1>

    <a class="active">Dashboard</a>
    <a>Battle Input</a>
    <a>Weapons</a>
    <a>Stats</a>
  </aside>

  <!-- メイン -->
  <main class="main">

    <!-- 上部ステータス -->
    <div class="top-stats">

      <div class="stat-box">
        <div class="label">Total</div>
        <div id="totalBattles" class="value">0</div>
      </div>

      <div class="stat-box">
        <div class="label">Win Rate</div>
        <div id="winRate" class="value">0%</div>
      </div>

      <div class="stat-box">
        <div class="label">Wins</div>
        <div id="wins" class="value">0</div>
      </div>

      <div class="stat-box">
        <div class="label">Loses</div>
        <div id="loses" class="value">0</div>
      </div>

    </div>

    <!-- 入力 -->
    <section class="panel">

      <h2>Battle Input</h2>

      <form id="battleForm">

        <div class="grid">

          <div>
            <label>Weapon</label>
            <select id="weapon"></select>
          </div>

          <div>
            <label>Rule</label>
            <select id="rule">
              <option>ナワバリ</option>
              <option>ガチエリア</option>
              <option>ガチヤグラ</option>
              <option>ガチホコ</option>
              <option>ガチアサリ</option>
            </select>
          </div>

          <div>
            <label>Result</label>
            <select id="result">
              <option value="win">Win</option>
              <option value="lose">Lose</option>
              <option value="disconnect">Disconnect</option>
              <option value="invalid">Invalid</option>
            </select>
          </div>

          <div>
            <label>Kill</label>
            <input id="kill" type="number">
          </div>

          <div>
            <label>Death</label>
            <input id="death" type="number">
          </div>

        </div>

        <label>Memo</label>
        <input id="memo" type="text">

        <button type="submit">Save Battle</button>

      </form>

    </section>

    <!-- 一覧 -->
    <section class="panel">

      <h2>Recent Battles</h2>

      <div id="list"></div>

    </section>

  </main>

</div>

<!-- toast -->
<div id="toast">Saved</div>

<script src="app.js"></script>

</body>
</html>
