<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkLog v0.5.0</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="layout">

    <!-- ===== サイドバー ===== -->
    <aside class="sidebar">

      <div class="logo">
        <h1>🦑 InkLog</h1>
        <p>Battle Tracker</p>
      </div>

      <nav class="menu">
        <a class="active" href="#"><span>🏠</span> ホーム</a>
        <a href="#"><span>📝</span> 戦績入力</a>
        <a href="#"><span>📋</span> 戦績一覧</a>
        <a href="#"><span>📊</span> 統計</a>
        <a href="#"><span>🔫</span> ブキ</a>
        <a href="#"><span>🗺️</span> ステージ</a>
        <a href="#"><span>⚙️</span> 設定</a>
      </nav>

    </aside>

    <!-- ===== メイン ===== -->
    <main class="main">

      <!-- ヘッダー -->
      <header class="header">
        <div>
          <h2>InkLog Dashboard</h2>
          <p>Splatoon Battle Record</p>
        </div>

        <div class="header-icons">
          <button>🔍</button>
          <button>🔔</button>
          <button>👤</button>
        </div>
      </header>

      <!-- ようこそ -->
      <section class="welcome-card">
        <h2>👋 おかえり！</h2>
        <p>今日も最高のナワバリを塗りつくそう！</p>
      </section>

      <!-- ===== 統計ダッシュボード（v0.5.0） ===== -->
      <section class="dashboard">

        <div class="stat-card">
          <h3>試合数</h3>
          <div class="number" id="totalBattles">0</div>
        </div>

        <div class="stat-card">
          <h3>勝ち</h3>
          <div class="number" id="winCount">0</div>
        </div>

        <div class="stat-card">
          <h3>負け</h3>
          <div class="number" id="loseCount">0</div>
        </div>

        <div class="stat-card">
          <h3>勝率</h3>
          <div class="number" id="winRate">--%</div>
        </div>

      </section>

      <!-- ===== 戦績入力 ===== -->
      <section class="card">

        <h2>戦績入力</h2>

        <form id="battleForm">

          <label>ルール</label><br>
          <select id="rule">
            <option value="ナワバリ">ナワバリ</option>
            <option value="ガチエリア">ガチエリア</option>
            <option value="ガチヤグラ">ガチヤグラ</option>
            <option value="ガチホコ">ガチホコ</option>
            <option value="ガチアサリ">ガチアサリ</option>
          </select>

          <br><br>

          <label>結果</label><br>
          <select id="result">
            <option value="win">勝ち</option>
            <option value="lose">負け</option>
          </select>

          <br><br>

          <label>メモ</label><br>
          <input id="memo" type="text" placeholder="例：ホコ持ちミスった">

          <br><br>

          <button type="submit">保存</button>

        </form>

      </section>

      <!-- ===== 戦績一覧 ===== -->
      <section class="card">

        <h2>戦績一覧</h2>
        <div id="list"></div>

      </section>

    </main>

  </div>

  <script src="app.js"></script>

</body>

</html>
