<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Log</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Battle Log</h1>

<!-- タブ -->
<div class="tabs">
  <button onclick="showTab('inputTab')">入力</button>
  <button onclick="showTab('listTab')">戦績</button>
  <button onclick="showTab('statsTab')">統計</button>
</div>

<!-- 入力 -->
<section id="inputTab" class="tab active">

  <div class="card">

    <select id="weapon"></select>
    <select id="stage"></select>
    <select id="rule"></select>
    <select id="battleType"></select>

    <select id="result">
      <option value="win">勝ち</option>
      <option value="lose">負け</option>
    </select>

    <input id="kill" type="number" placeholder="キル">
    <input id="assist" type="number" placeholder="アシスト">
    <input id="death" type="number" placeholder="デス">
    <input id="paint" type="number" placeholder="塗り">

    <button onclick="saveBattle()">保存</button>

  </div>

</section>

<!-- 戦績 -->
<section id="listTab" class="tab">

  <div id="list"></div>

</section>

<!-- 統計 -->
<section id="statsTab" class="tab">

  <div id="summary"></div>

  <h3>武器ランキング</h3>
  <div id="weaponRank"></div>

  <h3>ステージランキング</h3>
  <div id="stageRank"></div>

</section>

<script src="app.js"></script>
</body>
</html>
